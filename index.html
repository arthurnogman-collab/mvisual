<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVISUAL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 10;
      cursor: pointer;
    }
    #overlay span {
      color: #fff;
      font-family: monospace;
      font-size: 1.5rem;
      opacity: 0.6;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    /* Story text overlay */
    #story {
      position: fixed;
      top: 8%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }
    #story-text {
      color: #fff;
      font-family: 'Georgia', serif;
      font-size: 1.3rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      transition: opacity 2s ease;
      text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 60px rgba(255,255,255,0.1);
      max-width: 600px;
      line-height: 1.8;
    }
    #story-text.visible { opacity: 0.7; }
    #story-text.bright { opacity: 1; text-shadow: 0 0 30px rgba(255,255,255,0.6), 0 0 80px rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div id="overlay"><span>CLICK TO BEGIN</span></div>
  <div id="story"><div id="story-text"></div></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
