<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVISUAL</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    body.locked, body.locked canvas { cursor: none; }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 10;
      cursor: pointer;
    }

    #overlay span {
      color: #0ff;
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.6;
      animation: pulse 2s ease-in-out infinite;
      text-shadow: 0 0 10px rgba(0,255,255,0.6), 0 0 30px rgba(0,255,255,0.3), 0 0 60px rgba(0,255,255,0.1);
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; text-shadow: 0 0 10px rgba(0,255,255,0.3); }
      50% { opacity: 0.9; text-shadow: 0 0 15px rgba(0,255,255,0.8), 0 0 40px rgba(0,255,255,0.4), 0 0 80px rgba(0,255,255,0.2); }
    }
    /* Story text overlay — BIG and centered */
    #story {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }
    #story-text {
      color: #0ff;
      font-family: 'Orbitron', monospace;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      transition: opacity 1.5s ease;
      text-shadow: 0 0 15px rgba(0,255,255,0.8), 0 0 40px rgba(0,255,255,0.4), 0 0 80px rgba(0,100,255,0.2);
      max-width: 90vw;
      line-height: 1.5;
    }
    #story-text.visible { opacity: 0.9; }
    #story-text.bright {
      opacity: 1;
      color: #fff;
      font-size: 3.2rem;
      text-shadow: 0 0 20px rgba(0,255,255,1), 0 0 50px rgba(0,255,255,0.6), 0 0 100px rgba(0,100,255,0.4), 0 0 150px rgba(0,255,255,0.2);
    }

    /* ── Floating score numbers ── */
    .float-score {
      position: fixed;
      top: 40%;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      color: #0ff;
      pointer-events: none;
      z-index: 15;
      opacity: 1;
      text-shadow: 0 0 12px rgba(0,255,255,0.9), 0 0 30px rgba(0,255,255,0.5), 0 0 60px rgba(0,100,255,0.3);
      transition: transform 1s ease-out, opacity 1s ease-out;
      transform: translateY(0) scale(1);
    }
    .float-score.normal { font-size: 2rem; }
    .float-score.big { font-size: 3rem; color: #ff0; text-shadow: 0 0 15px rgba(255,255,0,0.9), 0 0 40px rgba(255,200,0,0.5); }
    .float-score.bad { font-size: 2rem; color: #f44; text-shadow: 0 0 15px rgba(255,50,50,0.9), 0 0 40px rgba(255,0,0,0.5); }
    .float-score.go {
      transform: translateY(-120px) scale(1.3);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="overlay"><span>CLICK TO ENTER</span></div>
  <div id="story"><div id="story-text"></div></div>
  <script>
    if (/Mobi|Android|iPhone|iPad|iPod|webOS|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 1024)) {
      document.getElementById('overlay').innerHTML = '<span style="animation:none;opacity:0.9;font-size:1.1rem;text-align:center;line-height:2">SORRY<br>DESKTOP ONLY</span>';
      document.getElementById('overlay').style.cursor = 'default';
    }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
