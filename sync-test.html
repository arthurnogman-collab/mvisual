<!DOCTYPE html>
<html>
<head>
  <title>MIDI Sync Test</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: monospace; }
    canvas { display: block; }
    #info { position: fixed; top: 10px; left: 10px; font-size: 14px; z-index: 10; }
    #start { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; cursor: pointer; z-index: 20; font-size: 24px; color: #fff; }
  </style>
</head>
<body>
  <div id="start">CLICK TO START (plays from 28s)</div>
  <div id="info">Loading...</div>
  <canvas id="c"></canvas>
  <script>
    // Music box notes from MIDI (30s-60s)
    const NOTES = [
      [30.000, 81], [30.234, 83], [30.469, 85], [30.703, 80],
      [33.750, 81], [33.984, 80], [34.219, 76], [34.453, 81],
      [37.031, 76], [37.266, 78], [37.500, 81], [37.734, 83],
      [37.969, 85], [38.203, 80],
      [40.781, 76], [41.016, 78], [41.250, 90], [41.484, 88],
      [41.719, 83], [41.953, 78],
      [44.531, 76], [44.766, 78], [45.000, 81], [45.234, 83],
      [45.469, 85], [45.703, 80],
      [48.750, 81], [48.984, 80], [49.219, 76], [49.453, 81],
      [52.031, 76], [52.266, 78], [52.500, 81], [52.734, 83],
      [52.969, 85], [53.203, 80],
      [55.781, 76], [56.016, 78], [56.250, 81],
      [57.656, 88], [57.891, 90],
      [59.531, 88], [59.766, 87],
    ];

    const canvas = document.getElementById('c');
    const ctx2d = canvas.getContext('2d');
    const info = document.getElementById('info');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Note to color
    function noteColor(note) {
      const hue = ((note % 12) / 12) * 360;
      return `hsl(${hue}, 80%, 60%)`;
    }

    // Note to Y position
    function noteY(note) {
      return canvas.height - ((note - 55) / 40) * canvas.height;
    }

    let audioCtx, buffer, source, startedAt;
    const startOffset = 28; // start playing from 28s
    const triggered = new Set();
    const circles = []; // {x, y, color, radius, time}

    document.getElementById('start').addEventListener('click', async () => {
      document.getElementById('start').remove();

      audioCtx = new AudioContext();
      info.textContent = 'Loading MP3...';

      const resp = await fetch('/music/dead5.mp3');
      const arrayBuf = await resp.arrayBuffer();
      buffer = await audioCtx.decodeAudioData(arrayBuf);

      info.textContent = `Buffer duration: ${buffer.duration.toFixed(2)}s, Sample rate: ${buffer.sampleRate}`;

      source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.start(0, startOffset); // start from 28s
      startedAt = audioCtx.currentTime;

      loop();
    });

    function getCurrentTime() {
      return audioCtx.currentTime - startedAt + startOffset;
    }

    function loop() {
      requestAnimationFrame(loop);

      const songTime = getCurrentTime();

      // Check for notes to trigger
      for (let i = 0; i < NOTES.length; i++) {
        const [noteTime, note] = NOTES[i];
        if (!triggered.has(i) && songTime >= noteTime) {
          triggered.add(i);
          // Spawn a circle
          const x = 100 + (i / NOTES.length) * (canvas.width - 200);
          circles.push({
            x,
            y: noteY(note),
            color: noteColor(note),
            radius: 0,
            maxRadius: 30,
            time: songTime,
            note,
            noteTime,
          });
        }
      }

      // Draw
      ctx2d.fillStyle = 'rgba(17, 17, 17, 0.15)';
      ctx2d.fillRect(0, 0, canvas.width, canvas.height);

      // Draw timeline
      ctx2d.strokeStyle = '#333';
      ctx2d.beginPath();
      ctx2d.moveTo(100, canvas.height / 2);
      ctx2d.lineTo(canvas.width - 100, canvas.height / 2);
      ctx2d.stroke();

      // Draw expected note positions (dim)
      for (let i = 0; i < NOTES.length; i++) {
        const [noteTime, note] = NOTES[i];
        const x = 100 + (i / NOTES.length) * (canvas.width - 200);
        const y = noteY(note);
        ctx2d.beginPath();
        ctx2d.arc(x, y, 5, 0, Math.PI * 2);
        ctx2d.strokeStyle = triggered.has(i) ? '#555' : '#444';
        ctx2d.stroke();
      }

      // Draw triggered circles (growing)
      for (const c of circles) {
        const age = songTime - c.time;
        c.radius = Math.min(c.maxRadius, age * 80);
        const alpha = Math.max(0, 1 - age * 0.5);

        ctx2d.beginPath();
        ctx2d.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
        ctx2d.fillStyle = c.color;
        ctx2d.globalAlpha = alpha;
        ctx2d.fill();
        ctx2d.globalAlpha = 1;

        // Label
        if (age < 2) {
          ctx2d.fillStyle = '#fff';
          ctx2d.font = '10px monospace';
          ctx2d.fillText(`${c.noteTime.toFixed(2)}s`, c.x - 15, c.y - c.radius - 5);
        }
      }

      // Playhead info
      ctx2d.fillStyle = '#fff';
      ctx2d.font = '16px monospace';
      ctx2d.fillText(`Song time: ${songTime.toFixed(3)}s | Triggered: ${triggered.size}/${NOTES.length}`, 10, 30);

      // Draw playhead on timeline
      const playheadNorm = (songTime - 30) / 30; // 0-1 across the 30s-60s range
      const playheadX = 100 + playheadNorm * (canvas.width - 200);
      ctx2d.strokeStyle = '#ff0';
      ctx2d.beginPath();
      ctx2d.moveTo(playheadX, 0);
      ctx2d.lineTo(playheadX, canvas.height);
      ctx2d.stroke();
    }
  </script>
</body>
</html>
